<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>본부별 링커 현황</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&display=swap');
:root{
  --hd-blue:#003087;
  --hd-blue2:#0F4C9A;
  --hd-border:#ccc;
  --hd-tborder:#ccc;
  --hd-bg:#e8e8e8;
  --hd-head-bg:#EEF3FA;
  --hd-text:#222;
  --hd-muted:#888;
  --white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:13px}
body{
  font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
  background:var(--hd-bg);color:var(--hd-text);line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.page{
  max-width:794px;margin:20px auto;padding:28px 36px 40px;
  background:var(--white);
  box-shadow:0 4px 24px rgba(0,0,0,.16);
}
.page-title{
  font-size:17px;font-weight:700;color:#111;letter-spacing:-.02em;
  text-align:center;margin-bottom:4px;line-height:1.4;
}
.hd-rule{height:3px;background:var(--hd-blue);margin-bottom:1px}
.hd-rule2{height:1px;background:var(--hd-border);margin-bottom:18px}
.unit-note{font-size:10.5px;font-weight:600;color:var(--hd-muted);white-space:nowrap}
.unit-note.hidden{display:none!important}
.topbar{margin-bottom:18px}
.topbar-in{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:6px;
}
.topbar-in--tier1{
  grid-template-columns:repeat(4,minmax(0,1fr));
}
.topbar-sub{
  margin-top:10px;display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:6px;
}
.topbar-sub.hidden{display:none!important}
.top-btn{
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-family:inherit;
  min-height:36px;padding:5px 4px;font-size:10px;font-weight:700;color:#555;
  border:1px solid var(--hd-border);border-radius:3px;background:#fafafa;
  cursor:pointer;line-height:1.2;word-break:keep-all;
}
.top-btn:hover{background:var(--hd-head-bg);border-color:#b8cef0;color:var(--hd-blue)}
.top-btn.primary{background:var(--hd-blue);color:#fff;border-color:var(--hd-blue)}
.top-btn.primary:hover{background:#082a6b}
.top-btn--home{font-weight:900;font-size:11px}
.sec-head{
  font-size:13.5px;font-weight:700;color:#111;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.panel-row .sec-head{margin-bottom:0}
.sec-head .bar{
  width:4px;height:15px;background:var(--hd-blue);border-radius:2px;flex-shrink:0;
}
.panel{margin-bottom:20px}
.panel-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.panel-head{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:8px}
.panel-title{font-size:13.5px;font-weight:700;color:#111;margin:0}
.table-toolbar{display:flex;justify-content:flex-end;margin-bottom:8px}
.hidden{display:none!important}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.hd-table{
  width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:4px;
}
table.hd-table th{
  background:var(--hd-head-bg);color:var(--hd-blue);font-weight:700;
  padding:8px 10px;border:1px solid var(--hd-tborder);text-align:center;vertical-align:middle;
  font-size:11px;line-height:1.5;
}
table.hd-table th.th-left{text-align:left}
table.hd-table th.th-center{text-align:center}
table.hd-table td{
  padding:7px 10px;border:1px solid var(--hd-tborder);vertical-align:middle;
  color:var(--hd-text);font-size:11.5px;line-height:1.5;
}
table.hd-table td.td-left{text-align:left}
table.hd-table td.td-center{text-align:center}
table.hd-table td.td-bonbu-hyeobi{color:#c62828;font-weight:700}
table.hd-table tfoot th,table.hd-table tfoot td{
  background:#f4f8fd;font-weight:700;border:1px solid var(--hd-tborder);
}
#table-summary tfoot tr.summary-foot-grand th,
#table-summary tfoot tr.summary-foot-grand td{
  color:#b91c1c;font-weight:800;
  background:#fde8e8;
}
.summary-table{table-layout:fixed}
.summary-table col.col-num{width:7%}
.summary-table col.col-dept{width:33%}
.summary-table col.col-metric{width:15%}
.team-mini-stats{
  display:flex;flex-wrap:wrap;align-items:stretch;justify-content:space-between;
  gap:10px;margin-bottom:10px;
}
.team-mini-stats table{
  flex:1;min-width:min(160px,100%);max-width:calc(50% - 5px);
  margin-bottom:0;font-size:10.5px;
}
.team-mini-stats th,.team-mini-stats td{padding:5px 8px!important}
.team-mini-stats th{background:#f0f4fb;color:var(--hd-blue);font-weight:700;width:52%}
.team-mini-stats td{text-align:center;font-weight:600}
.summary-tier-wrap{
  display:flex;justify-content:flex-end;margin-bottom:10px;
}
.summary-tier-wrap .hd-table{
  max-width:min(100%,280px);margin-bottom:0;font-size:10.5px;
}
.summary-tier-wrap th,.summary-tier-wrap td{padding:5px 8px!important}
.summary-tier-wrap th{background:#f0f4fb;color:var(--hd-blue);font-weight:700;width:52%}
.summary-tier-wrap td{text-align:center;font-weight:600}
table.hd-table tr.summary-subtotal td,
table.hd-table tr.summary-subtotal th{
  background:#f0f5fc;font-weight:700;border:1px solid var(--hd-tborder);
  color:var(--hd-text);
}
table.hd-table tr.summary-subtotal th.summary-subtotal-label{
  text-align:left;color:#1a3d6e;font-size:11px;
}
table.hd-table tfoot tr th#summary-foot-label{
  vertical-align:middle;
}
.team-table col.c0{width:6%}
.team-table col.c1{width:18%}
.team-table col.c2{width:46%}
.team-table col.c3{width:15%}
.team-table col.c4{width:15%}
.footer-note{margin-top:18px;font-size:10.5px;color:var(--hd-muted);text-align:center}
.team-wrap{
  width:100%;max-width:100%;overflow-x:hidden;
  container-type:inline-size;container-name:teamtbl;
}
.team-table{table-layout:fixed;width:100%;max-width:100%}
/* 열 너비 고정(colgroup), 가로 확장 없음 — 글자만 작아짐 */
table.hd-table.team-table{
  font-size:clamp(6.5px, 0.52rem + 1.05vw, 11px);
}
@supports (font-size:1cqw){
  table.hd-table.team-table{
    font-size:clamp(6.5px, min(2.65cqw, 0.52rem + 0.9vw), 11px);
  }
}
table.hd-table.team-table th,
table.hd-table.team-table td{
  font-size:inherit;
  padding:5px 5px;
  overflow:hidden;
  word-break:break-word;
  line-height:1.35;
}
@media (max-width:720px){
  .page{margin:12px;padding:18px 14px 28px}
  .top-btn{font-size:9px;min-height:34px}
}
@media (max-width:480px){
  .top-btn{font-size:8.5px;min-height:32px;padding:4px 2px}
}
</style>

    '전략기획사업부',
    '감사실',
    'GBC개발사업단'
  ];
  var DOMESTIC_ORDER = [
    '토목사업본부(국내)',
    '건축주택사업본부(국내)',
    '플랜트사업본부(국내)',
    'NewEnergy사업부(국내)',
    '개발사업부(국내)'
  ];
  var OVERSEAS_ORDER = [
    '토목사업본부(해외)',
    '건축주택사업본부(해외)',
    '플랜트사업본부(해외)',
    'NewEnergy사업부(해외)'
  ];

  var SUMMARY_ROWS = [
    ['토목사업본부',2,19,3,16],
    ['건축주택사업본부',3,31,10,21],
    ['플랜트사업본부',2,29,6,23],
    ['NewEnergy사업부',3,11,3,8],
    ['안전품질본부',3,19,7,12],
    ['개발사업부',2,11,4,7],
    ['글로벌사업부',3,6,1,5],
    ['기술연구원',2,12,3,9],
    ['PI본부',2,12,2,10],
    ['재경본부',3,17,3,14],
    ['경영지원본부',2,18,6,12],
    ['전략기획사업부',1,4,3,1],
    ['감사실',0,3,0,3],
    ['GBC개발사업단',0,4,1,3],
    ['토목사업본부(국내)',0,39,6,33],
    ['건축주택사업본부(국내)',1,79,21,58],
    ['플랜트사업본부(국내)',0,2,0,2],
    ['NewEnergy사업부(국내)',0,5,0,5],
    ['개발사업부(국내)',0,2,0,2],
    ['토목사업본부(해외)',0,13,4,9],
    ['건축주택사업본부(해외)',0,7,3,4],
    ['플랜트사업본부(해외)',1,12,3,9],
    ['NewEnergy사업부(해외)',0,10,4,6]
  ];

  /** 링커 현황.xlsx 「링커 대상 팀」 — F열='O' 필터링 후 B·D·E·G 4열만 추출.
   *  matrix[0]=헤더(['본부','팀명','담당 ACE','AI링커']), 본부 = 인덱스 0. run_linker_extract.py 로 채움 */
  var linkerExcel = null;
  var EXCEL_B_COL = 0;

  function loadEmbeddedSummary(){
    var el = document.getElementById('embed-linker-summary');
    if(!el) return false;
    try{
      var d = JSON.parse(el.value);
      if(!d.rows || !d.rows.length) return false;
      var cleaned = d.rows
        .map(function(r){
          return [
            String(r[0] == null ? '' : r[0]).trim(),
            Number(r[1]) || 0,
            Number(r[2]) || 0,
            Number(r[3]) || 0,
            Number(r[4]) || 0
          ];
        })
        .filter(function(r){ return r[0] !== ''; });
      if(cleaned.length){
        SUMMARY_ROWS = cleaned;
        return true;
      }
      return false;
    } catch(e){
      return false;
    }
  }

  var nav1 = document.getElementById('nav-tier1');
  var nav2 = document.getElementById('nav-tier2');
  /** @type {null|'bonsa'|'domestic'|'overseas'} */
  var navRegion = null;
  var panelMain = document.getElementById('panel-main');
  var panelTeams = document.getElementById('panel-teams');
  var summaryBody = document.getElementById('summary-body');
  var teamsTitle = document.getElementById('teams-title');
  var teamsContainer = document.getElementById('teams-container');

  function esc(s){
    if(s == null) return '';
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function bonbuAliases(canonical){
    var set = {};
    function add(s){
      if(s != null && s !== '') set[String(s)] = true;
    }
    add(canonical);
    add(canonical.replace('(국내현장)', '(국내)'));
    add(canonical.replace('(해외현장)', '(해외)'));
    add(canonical.replace('(국내)', '(국내현장)'));
    add(canonical.replace('(해외)', '(해외현장)'));
    return set;
  }

  function rowMatchesDept(cellVal, deptName){
    var v = String(cellVal == null ? '' : cellVal).trim();
    var keys = bonbuAliases(deptName);
    return Object.prototype.hasOwnProperty.call(keys, v);
  }

  function loadEmbeddedTeams(){
    var el = document.getElementById('embed-linker-teams');
    if(!el) return false;
    try{
      var d = JSON.parse(el.value);
      if(!d.matrix || !d.matrix.length) return false;
      var matrix = d.matrix.map(function(row){
        return row.map(function(c){ return c == null ? '' : String(c); });
      });
      if(matrix[0] && matrix[0].length > 3) matrix[0][3] = 'AI링커';
      matrix.slice(1).forEach(function(row){
        while(row.length < 4) row.push('');
        if(isPendingLinkerValue(row[3])) row[3] = '본부 협의';
      });
      linkerExcel = {
        matrix: matrix,
        sheetName: d.sheetName || '링커 대상 팀',
        fileName: '링커 현황.xlsx'
      };
      return true;
    } catch(e){
      return false;
    }
  }

  function getTeamSource(){
    if(linkerExcel && linkerExcel.matrix && linkerExcel.matrix.length){
      var m = linkerExcel.matrix;
      return {
        headers: m[0],
        rows: m.slice(1),
        bi: EXCEL_B_COL,
        sheetName: linkerExcel.sheetName,
        fileName: linkerExcel.fileName
      };
    }
    return null;
  }

  function hasRowsForDept(deptName){
    var src = getTeamSource();
    if(!src) return false;
    var bi = src.bi;
    var colCount = src.headers.length;
    return src.rows.some(function(r){
      var copy = r.slice();
      while(copy.length < colCount) copy.push('');
      return rowMatchesDept(copy[bi], deptName);
    });
  }

  function orderedDomesticDepts(){
    return DOMESTIC_ORDER.filter(hasRowsForDept);
  }

  function orderedOverseasDepts(){
    return OVERSEAS_ORDER.filter(hasRowsForDept);
  }

  function subDeptsForRegion(){
    if(navRegion === 'bonsa') return BONSA_DEPTS.slice();
    if(navRegion === 'domestic') return orderedDomesticDepts();
    if(navRegion === 'overseas') return orderedOverseasDepts();
    return [];
  }

  /** 갑지: 구역 미선택 시 전체, 본사/국내/해외 선택 시 해당 2단 배너와 동일 본부만 */
  function summaryRowsForCurrentRegion(){
    if(!navRegion) return SUMMARY_ROWS.slice();
    var map = {};
    SUMMARY_ROWS.forEach(function(r){
      map[r[0]] = r;
    });
    var order =
      navRegion === 'bonsa'
        ? BONSA_DEPTS
        : navRegion === 'domestic'
          ? orderedDomesticDepts()
          : orderedOverseasDepts();
    return order.map(function(name){
      return map[name];
    }).filter(Boolean);
  }

  /** 링커 대상 팀 시트 행 — 현재 상단 구역(홈=전체, 본사/국내/해외=해당 본부만) */
  function teamRowsForCurrentRegion(){
    var src = getTeamSource();
    if(!src) return [];
    var bi = src.bi;
    var colCount = src.headers.length;
    function pad(r){
      var copy = r.slice();
      while(copy.length < colCount) copy.push('');
      return copy;
    }
    if(!navRegion){
      return src.rows.map(pad);
    }
    var order =
      navRegion === 'bonsa'
        ? BONSA_DEPTS
        : navRegion === 'domestic'
          ? orderedDomesticDepts()
          : orderedOverseasDepts();
    return src.rows
      .filter(function(r){
        var copy = pad(r);
        var deptCell = copy[bi];
        return order.some(function(dname){
          return rowMatchesDept(deptCell, dname);
        });
      })
      .map(pad);
  }

  function personKeyFromLabel(segment){
    var s = String(segment == null ? '' : segment).trim().replace(/\s+/g, '');
    if(!s) return '';
    return s.replace(
      /(책임연구원|매니저|책임|팀장|수석|연구원)$/,
      ''
    );
  }

  function isPendingLinkerValue(value){
    var s = value == null ? '' : String(value).trim();
    return s === '' || s === '본부 협의';
  }

  /** AI링커 열: 팀(행)마다 선정 완료 1 또는 미선정 1 — 셀에 이름이 여러 명이어도 1팀 */
  function teamSelectionCountsByTeam(filteredRows, linkerCol){
    var lc = linkerCol == null ? 3 : linkerCol;
    var done = 0;
    filteredRows.forEach(function(r){
      if(!isPendingLinkerValue(r[lc])) done++;
    });
    var total = filteredRows.length;
    return { done: done, pending: total - done };
  }

  /** AI링커 열만 직함 기준 고유 인원 — 담당 ACE는 집계하지 않음 */
  function countTierMentionsInTeamRows(matrixRows){
    var senSet = {};
    var manSet = {};
    function add(setObj, k){
      if(k) setObj[k] = true;
    }
    function bump(part){
      var p = String(part == null ? '' : part).trim();
      if(!p) return;
      var key = personKeyFromLabel(p);
      if(/매니저/.test(p)){
        add(manSet, key || p);
        return;
      }
      if(/책임연구원|책임|팀장|수석/.test(p)){
        add(senSet, key || p);
        return;
      }
      if(/연구원/.test(p)){
        add(manSet, key || p);
      }
    }
    var linkerCol = 3;
    matrixRows.forEach(function(r){
      var raw = r[linkerCol] != null ? String(r[linkerCol]) : '';
      if(isPendingLinkerValue(raw)) return;
      raw.split(/[,，]/).forEach(bump);
    });
    return {
      sen: Object.keys(senSet).length,
      man: Object.keys(manSet).length
    };
  }

  function sumSummaryMetrics(arr){
    var ace = 0;
    var linker = 0;
    var done = 0;
    var pending = 0;
    arr.forEach(function(row){
      ace += Number(row[1]) || 0;
      linker += Number(row[2]) || 0;
      done += Number(row[3]) || 0;
      pending += Number(row[4]) || 0;
    });
    return { ace: ace, linker: linker, done: done, pending: pending };
  }

  function buildSummaryDataRow(rowNum, row){
    return (
      '<tr><td class="td-center">' +
      esc(String(rowNum)) +
      '</td><td class="td-left">' +
      esc(row[0]) +
      '</td><td class="td-center">' +
      esc(String(row[1])) +
      '</td><td class="td-center">' +
      esc(String(row[2])) +
      '</td><td class="td-center">' +
      esc(String(row[3])) +
      '</td><td class="td-center">' +
      esc(String(row[4] != null ? row[4] : '')) +
      '</td></tr>'
    );
  }

  function buildSummarySubtotalRow(label, m){
    return (
      '<tr class="summary-subtotal">' +
      '<th class="summary-subtotal-label th-left" colspan="2" scope="row">' +
      esc(label) +
      '</th>' +
      '<td class="td-center">' +
      esc(String(m.ace)) +
      '</td><td class="td-center">' +
      esc(String(m.linker)) +
      '</td><td class="td-center">' +
      esc(String(m.done)) +
      '</td><td class="td-center">' +
      esc(String(m.pending)) +
      '</td></tr>'
    );
  }

  function renderSummary(){
    var footLabel = document.getElementById('summary-foot-label');
    var rows = summaryRowsForCurrentRegion();

    if(navRegion){
      if(footLabel) footLabel.textContent = '합계';
      summaryBody.innerHTML = rows
        .map(function(row, idx){
          return buildSummaryDataRow(idx + 1, row);
        })
        .join('');
      var sm = sumSummaryMetrics(rows);
      document.getElementById('sum-ace').textContent = String(sm.ace);
      document.getElementById('sum-linker').textContent = String(sm.linker);
      document.getElementById('sum-done').textContent = String(sm.done);
      document.getElementById('sum-pending').textContent = String(sm.pending);
    } else {
      if(footLabel) footLabel.textContent = '종합 합계';
      var map = {};
      SUMMARY_ROWS.forEach(function(r){
        map[r[0]] = r;
      });
      var bonsaRows = BONSA_DEPTS.map(function(n){
        return map[n];
      }).filter(Boolean);
      var siteRows = DOMESTIC_ORDER.concat(OVERSEAS_ORDER)
        .map(function(n){
          return map[n];
        })
        .filter(Boolean);

      var html = [];
      var rowNum = 0;
      bonsaRows.forEach(function(row){
        rowNum++;
        html.push(buildSummaryDataRow(rowNum, row));
      });
      if(bonsaRows.length){
        html.push(
          buildSummarySubtotalRow('본사 소계', sumSummaryMetrics(bonsaRows))
        );
      }

      siteRows.forEach(function(row){
        rowNum++;
        html.push(buildSummaryDataRow(rowNum, row));
      });
      if(siteRows.length){
        html.push(
          buildSummarySubtotalRow('현장 소계', sumSummaryMetrics(siteRows))
        );
      }

      summaryBody.innerHTML = html.join('');

      var total = sumSummaryMetrics(bonsaRows.concat(siteRows));
      document.getElementById('sum-ace').textContent = String(total.ace);
      document.getElementById('sum-linker').textContent = String(total.linker);
      document.getElementById('sum-done').textContent = String(total.done);
      document.getElementById('sum-pending').textContent = String(total.pending);
    }

    var footTr = document.querySelector('#table-summary tfoot tr');
    if(footTr){
      footTr.classList.toggle('summary-foot-grand', !navRegion);
    }

    var tierWrap = document.getElementById('summary-tier-wrap');
    var tierSen = document.getElementById('summary-tier-sen');
    var tierMan = document.getElementById('summary-tier-man');
    if(tierWrap && tierSen && tierMan){
      if(getTeamSource()){
        tierWrap.classList.remove('hidden');
        var tiers = countTierMentionsInTeamRows(teamRowsForCurrentRegion());
        tierSen.textContent = String(tiers.sen);
        tierMan.textContent = String(tiers.man);
      } else {
        tierWrap.classList.add('hidden');
      }
    }
  }

  function renderTier2(){
    nav2.innerHTML = '';
    if(!navRegion){
      nav2.classList.add('hidden');
      return;
    }
    nav2.classList.remove('hidden');
    subDeptsForRegion().forEach(function(label){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'top-btn';
      btn.textContent = label;
      btn.setAttribute('role', 'tab');
      btn.setAttribute('data-dept', label);
      btn.setAttribute('aria-selected', 'false');
      btn.addEventListener('click', function(){
        setView('dept', label);
      });
      nav2.appendChild(btn);
    });
  }

  function syncNavButtons(mode, deptName){
    nav1.querySelectorAll('.top-btn').forEach(function(btn){
      var isHome = btn.classList.contains('top-btn--home');
      var rg = btn.getAttribute('data-region');
      var homeOn = isHome && mode === 'main' && !navRegion;
      var regionOn = rg && navRegion === rg;
      var on = homeOn || regionOn;
      btn.classList.toggle('primary', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    nav2.querySelectorAll('.top-btn').forEach(function(btn){
      var d = btn.getAttribute('data-dept');
      var on = mode === 'dept' && d === deptName;
      btn.classList.toggle('primary', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });
  }

  function selectRegion(r){
    navRegion = r;
    renderSummary();
    renderTier2();
    setView('main', null);
  }

  function syncUnitNote(mode){
    var show = mode === 'main';
    var elS = document.getElementById('unit-note-summary');
    if(elS){
      elS.classList.toggle('hidden', !show);
      elS.setAttribute('aria-hidden', show ? 'false' : 'true');
    }
  }

  function setView(mode, deptName){
    if(mode === 'main'){
      panelMain.classList.remove('hidden');
      panelTeams.classList.add('hidden');
    } else {
      panelMain.classList.add('hidden');
      panelTeams.classList.remove('hidden');
      teamsTitle.textContent = '링커 대상 팀 — ' + deptName;
      renderTeamTable(deptName);
    }
    syncUnitNote(mode);
    syncNavButtons(mode, deptName);
  }

  /** 파이썬에서 이미 B·D·E·G만 추출했으므로 그대로 0..3 사용 */
  var TEAM_COL_IDX = [0, 1, 2, 3];
  var TEAM_DISPLAY_HEADERS = ['본부', '팀명', '담당 ACE', 'AI링커'];
  function renderTeamTable(deptName){
    var src = getTeamSource();

    if(!src){
      teamsContainer.innerHTML = '';
      return;
    }

    var headers = src.headers;
    var rows = src.rows;
    var bi = src.bi;
    var colCount = headers.length;

    var filtered = rows.filter(function(r){
      var copy = r.slice();
      while(copy.length < colCount) copy.push('');
      return rowMatchesDept(copy[bi], deptName);
    });

    if(!filtered.length){
      teamsContainer.innerHTML = '';
      return;
    }

    /** 링커 대상·선정·미선정은 모두 이 표의 팀(행) 기준. 선정/미선정은 팀 단위(AI링커가 비었거나 본부 협의면 미선정 1팀). */
    var teamsTarget = filtered.length;
    var sel = teamSelectionCountsByTeam(filtered, 3);
    var doneN = sel.done;
    var pendN = sel.pending;
    var tiers = countTierMentionsInTeamRows(filtered);

    var miniLeft =
      '<table class="hd-table" aria-label="팀 기준 요약">' +
      '<tbody>' +
      '<tr><th class="th-left">링커 대상 팀</th><td class="td-center">' +
      esc(String(teamsTarget)) +
      '</td></tr>' +
      '<tr><th class="th-left">선정 완료</th><td class="td-center">' +
      esc(String(doneN)) +
      '</td></tr>' +
      '<tr><th class="th-left">미선정</th><td class="td-center">' +
      esc(String(pendN)) +
      '</td></tr>' +
      '</tbody></table>';
    var miniRight =
      '<table class="hd-table" aria-label="AI링커 직함 기준 인원">' +
      '<tbody>' +
      '<tr><th class="th-left">책임급</th><td class="td-center">' +
      esc(String(tiers.sen)) +
      '명</td></tr>' +
      '<tr><th class="th-left">매니저급</th><td class="td-center">' +
      esc(String(tiers.man)) +
      '명</td></tr>' +
      '</tbody></table>';

    var cg = '<colgroup>' +
      '<col class="c0"/><col class="c1"/><col class="c2"/><col class="c3"/><col class="c4"/>' +
      '</colgroup>';
    var thead =
      '<thead><tr><th class="th-center">번호</th>' +
      TEAM_DISPLAY_HEADERS.map(function(h){
        return '<th>' + esc(h) + '</th>';
      }).join('') +
      '</tr></thead>';

    var tbody = '<tbody>' + filtered.map(function(r, idx){
      var cells = r.slice();
      while(cells.length < colCount) cells.push('');
      var out = TEAM_COL_IDX.map(function(j){
        return cells[j] != null ? cells[j] : '';
      });
      var numCell =
        '<td class="td-center">' + esc(String(idx + 1)) + '</td>';
      var rest = out.map(function(c, j){
        var align = j >= 2 ? 'td-center' : 'td-left';
        var raw = String(c != null ? c : '');
        if(j === 3 && isPendingLinkerValue(raw)){
          return '<td class="' + align + ' td-bonbu-hyeobi">' + esc('본부 협의') + '</td>';
        }
        return '<td class="' + align + '">' + esc(raw) + '</td>';
      }).join('');
      return '<tr>' + numCell + rest + '</tr>';
    }).join('') + '</tbody>';

    teamsContainer.innerHTML =
      '<div class="team-mini-stats">' +
      miniLeft +
      miniRight +
      '</div>' +
      '<table class="hd-table team-table">' +
      cg +
      thead +
      tbody +
      '</table>';
  }

  var btnHome = document.createElement('button');
  btnHome.type = 'button';
  btnHome.className = 'top-btn top-btn--home';
  btnHome.textContent = '홈';
  btnHome.setAttribute('role', 'tab');
  btnHome.setAttribute('aria-label', '갑지 요약으로 이동');
  btnHome.setAttribute('aria-selected', 'false');
  btnHome.addEventListener('click', function(){
    navRegion = null;
    renderSummary();
    renderTier2();
    setView('main', null);
  });
  nav1.appendChild(btnHome);

  [
    { key: 'bonsa', label: '본사' },
    { key: 'domestic', label: '국내현장' },
    { key: 'overseas', label: '해외현장' }
  ].forEach(function(item){
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'top-btn';
    btn.textContent = item.label;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('data-region', item.key);
    btn.setAttribute('aria-selected', 'false');
    btn.addEventListener('click', function(){
      selectRegion(item.key);
    });
    nav1.appendChild(btn);
  });

  loadEmbeddedSummary();
  loadEmbeddedTeams();

  renderSummary();
  renderTier2();
  setView('main', null);
})();
</script>
</body>
</html>
